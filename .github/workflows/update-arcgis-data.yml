name: Update ArcGIS HantaTracker data

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-arcgis-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run ArcGIS parser
        run: node scripts/update-arcgis-data.js

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ArcGIS HantaTracker data"
          file_pattern: data/arcgis_hantavirus.json
