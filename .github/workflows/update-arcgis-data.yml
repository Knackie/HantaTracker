name: Update ArcGIS HantaTracker data

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-arcgis-data
  cancel-in-progress: true

jobs:
  update-arcgis-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync with latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run ArcGIS parser
        run: node scripts/update-arcgis-data.js

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arcgis_hantavirus.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update ArcGIS HantaTracker data"
          git pull --rebase origin main
          git push origin HEAD:main
